services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: singlebackenddb
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    expose:
      - "3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$${MYSQL_ROOT_PASSWORD}\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  backend:
    # Pulled from Docker Hub — run `docker login` first if the repo is private
    image: ketanjindal/backend:tagname
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/singlebackenddb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: nM8vYH0q3s9uZ4Yf2Vxq1JtPp4r6s8t9Qw+XyZ0aBc=
      SERVER_PORT: 8081
      # Razorpay keys (mapped to Spring property names via relaxed binding)
      RAZORPAY_KEY_ID: rzp_test_SI0K0qZiiOQGd4
      RAZORPAY_KEY_SECRET: PkH3jskxXjT3sPMw3IqmTztS
    ports:
      - "8081:8081"
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    # Pulled from Docker Hub — run `docker login` first if the repo is private
    image: ketanjindal/frontend:tagname
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # mount the host LetsEncrypt dir so cert symlinks resolve
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # optional webroot for Certbot (create ./frontend/certbot on host)
      - ./frontend/certbot:/var/www/certbot:ro
    depends_on:
      - backend

volumes:
  db_data:

networks:
  default:
    name: singlebackend_network
